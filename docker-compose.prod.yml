services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web

  web:
    ports: !reset []

  neo4j:
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  caddy_data:
