services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '127.0.0.1:80:80'
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      DB_PATH: /data/threadr.db
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - sqlite_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      DB_PATH: /data/threadr.db
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - sqlite_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - '127.0.0.1:7474:7474'
      - '127.0.0.1:7687:7687'
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_dbms_usage__report_enabled: "false"
      NEO4J_client_allow__telemetry: "false"
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  # --- Tor proxy instances (optional, start with: docker compose --profile tor up -d) ---
  # Each instance runs an isolated Tor circuit with a different exit IP.
  # Plugins are mapped to different instances so no single exit sees the full query pattern.
  tor-1:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:9051:9150'
    profiles: [tor]

  tor-2:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:9052:9150'
    profiles: [tor]

  tor-3:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:9053:9150'
    profiles: [tor]

  tor-4:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:9054:9150'
    profiles: [tor]

  tor-5:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:9055:9150'
    profiles: [tor]

volumes:
  neo4j_data:
  sqlite_data:
