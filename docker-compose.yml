services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: threadr123
      REDIS_HOST: redis
      DB_PATH: /data/threadr.db
    volumes:
      - sqlite_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: threadr123
      REDIS_HOST: redis
      DB_PATH: /data/threadr.db
    volumes:
      - sqlite_data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/threadr123
      NEO4J_dbms_usage__report_enabled: "false"
      NEO4J_client_allow__telemetry: "false"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "threadr123", "RETURN 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  # --- Tor proxy instances (optional, start with: docker compose --profile tor up -d) ---
  # Each instance runs an isolated Tor circuit with a different exit IP.
  # Plugins are mapped to different instances so no single exit sees the full query pattern.
  tor-1:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '9051:9150'
    profiles: [tor]

  tor-2:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '9052:9150'
    profiles: [tor]

  tor-3:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '9053:9150'
    profiles: [tor]

  tor-4:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '9054:9150'
    profiles: [tor]

  tor-5:
    image: peterdavehello/tor-socks-proxy:latest
    restart: unless-stopped
    ports:
      - '9055:9150'
    profiles: [tor]

volumes:
  neo4j_data:
  sqlite_data:
