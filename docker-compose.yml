services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: threadr123
      REDIS_HOST: redis
      DB_PATH: /data/threadr.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - neo4j
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_PASS: threadr123
      REDIS_HOST: redis
      DB_PATH: /data/threadr.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - neo4j
      - redis

  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/threadr123
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  neo4j_data:
  sqlite_data:
